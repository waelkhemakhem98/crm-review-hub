server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets + SPA fallback (React app has no client-side router yet,
    # but this keeps a hard refresh on any path from 404ing later).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same-origin from the browser's point of view -- no CORS needed.
    # "backend" resolves via Docker Compose's internal DNS (service name).
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }
}
