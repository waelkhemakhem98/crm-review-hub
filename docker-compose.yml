services:
  backend:
    build: ./backend
    # No published or exposed port on purpose: the frontend's nginx reaches it
    # at http://backend:8000 over the internal compose network (service-name
    # DNS works without `expose`). Keeping it port-less leaves the frontend as
    # the single app port for the deployment CLI to route to.
    volumes:
      - db-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    # Publish container port 80 without a fixed host port -- the deployment CLI
    # assigns/manages the host port itself. (Locally, find the mapped port with
    # `docker compose port frontend 80`.)
    ports:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db-data:
